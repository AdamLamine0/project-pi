apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: fatenke/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8091
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: EUREKA_INSTANCE_HOSTNAME
              value: api-gateway
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
            - name: SERVICES_USER_PI_URI
              value: http://user-pi:8081
            - name: APP_CORS_ALLOWED_ORIGIN_PATTERNS
              value: http://localhost,http://localhost:[*],http://127.0.0.1,http://127.0.0.1:[*],http://172.18.*.*,http://172.18.*.*:[*],http://192.168.*.*,http://192.168.*.*:[*],http://10.*.*.*,http://10.*.*.*:[*],http://*.nip.io,http://*.nip.io:[*],https://*.nip.io,https://*.nip.io:[*]
          readinessProbe:
            tcpSocket:
              port: 8091
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8091
      targetPort: 8091
