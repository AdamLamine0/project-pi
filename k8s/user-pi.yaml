apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-pi
  labels:
    app: user-pi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-pi
  template:
    metadata:
      labels:
        app: user-pi
    spec:
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_PWD
              value: root
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -hmysql -uroot --silent; do
                echo "Waiting for mysql:3306..."
                sleep 2
              done
      containers:
        - name: user-pi
          image: fatenke/user-pi:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              value: root
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: EUREKA_INSTANCE_HOSTNAME
              value: user-pi
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: user-pi
  labels:
    app: user-pi
spec:
  type: ClusterIP
  selector:
    app: user-pi
  ports:
    - name: http
      port: 8081
      targetPort: 8081
