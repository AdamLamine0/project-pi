spring.application.name=ai-service
server.port=8092

app.ai.ocr.enabled=true
app.ai.ocr.preview-length=900
app.ai.ocr.min-text-length=40

app.ai.vision.enabled=true
app.ai.vision.blur-threshold=100.0

app.ai.gemini.enabled=true
app.ai.gemini.base-url=https://generativelanguage.googleapis.com
app.ai.gemini.model=gemini-2.5-flash
app.ai.gemini.fallback-models=gemini-2.0-flash,gemini-1.5-flash
app.ai.gemini.api-key=${GEMINI_API_KEY:${GOOGLE_API_KEY:${GOOGLE_GEMINI_API_KEY:}}}
app.ai.gemini.timeout-seconds=45

app.ai.download.timeout-seconds=30
app.ai.download.max-in-memory-mb=25

app.ai.ocr.data-path=C:/Program Files/Tesseract-OCR/tessdata
app.ai.ocr.language=fra+eng
