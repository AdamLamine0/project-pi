<div class="page-container">
  <div class="page-header d-flex justify-content-between align-items-start mb-4">
    <div>
      <h1 class="page-title">Créer un dossier juridique</h1>
      <p class="page-subtitle">Renseignez les informations pour ouvrir votre dossier.</p>
    </div>
    <button class="btn btn-outline-secondary" type="button" (click)="goBack()">Retour</button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <div class="card-custom">
    <div class="form-section">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-4">

          <!-- Nom du projet -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Nom du projet *</label>
            <input class="form-control input-modern"
                   formControlName="projectName"
                   placeholder="Ex: Startup FinTech Tunis" />
            <div *ngIf="form.get('projectName')?.invalid && form.get('projectName')?.touched"
                 class="text-danger small mt-1">
              Le nom du projet est obligatoire.
            </div>
          </div>

          <!-- Type de procédure -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Type de procédure *</label>
            <select class="form-select select-modern" formControlName="procedureType">
              <option value="">Sélectionner</option>
              <option *ngFor="let type of procedureTypes" [value]="type">
                {{ procedureTypeLabels[type] }}
              </option>
            </select>
            <div *ngIf="form.get('procedureType')?.invalid && form.get('procedureType')?.touched"
                 class="text-danger small mt-1">
              Veuillez choisir un type de procédure.
            </div>
          </div>

          <!-- Choix de l'expert (liste statique) -->
          <div class="col-md-12">
            <label class="form-label fw-semibold">Expert juridique *</label>
            <select class="form-select select-modern" formControlName="expertId">
              <option value="">Sélectionner un expert</option>
              <option *ngFor="let expert of experts" [value]="expert.id">
                {{ expert.fullName }} — {{ expert.email }}
              </option>
            </select>
            <div *ngIf="form.get('expertId')?.invalid && form.get('expertId')?.touched"
                 class="text-danger small mt-1">
              Veuillez choisir un expert.
            </div>
          </div>

        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary-custom" type="submit" [disabled]="loading">
            {{ loading ? 'Création...' : 'Créer le dossier' }}
          </button>
          <button class="btn btn-outline-secondary" type="button" (click)="goBack()">
            Annuler
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
