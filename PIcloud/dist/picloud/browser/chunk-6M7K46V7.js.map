<div class="card">

  <!-- Cover image -->
  <div class="card-cover" [class.no-cover]="!event.coverImageUrl">
    <img *ngIf="event.coverImageUrl" [src]="event.coverImageUrl" [alt]="event.title" class="cover-img"/>
    <div *ngIf="!event.coverImageUrl" class="cover-placeholder">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <div class="cover-badges">
      <span class="type-pill">{{ event.type }}</span>
      <span class="status-pill" [ngClass]="statusClass">{{ statusLabel }}</span>
    </div>
  </div>

  <!-- Body -->
  <div class="card-body">
    <h3 class="card-title">{{ event.title }}</h3>
    <p class="card-desc" *ngIf="event.description">{{ event.description }}</p>

    <div class="card-meta">
      <div class="meta-item" *ngIf="event.startDate">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        {{ formatDate(event.startDate) }}
      </div>
      <div class="meta-item" *ngIf="event.locationType">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        {{ event.locationType }}
      </div>
      <div class="meta-item" *ngIf="event.capacityMax">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        </svg>
        {{ event.capacityMax }} places
      </div>
    </div>

    <!-- Tags -->
    <div class="card-tags" *ngIf="event.targetSector?.length">
      <span class="tag" *ngFor="let s of event.targetSector | slice:0:3">{{ s }}</span>
      <span class="tag tag-more" *ngIf="event.targetSector.length > 3">
        +{{ event.targetSector.length - 3 }}
      </span>
    </div>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <a [routerLink]="['/events', event.id]" class="btn-view">Voir</a>
    <div class="card-actions" *ngIf="canEdit">
      <a [routerLink]="['/events', event.id, 'edit']" class="btn-icon btn-icon-edit"
         title="Modifier">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </a>
      <button *ngIf="isAdmin" class="btn-icon btn-icon-delete"
              title="Supprimer" (click)="onDelete()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
      </button>
    </div>
  </div>

</div>
