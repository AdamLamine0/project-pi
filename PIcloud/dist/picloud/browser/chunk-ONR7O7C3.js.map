<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1>Set Your Password</h1>
      <p>Create a password for your account</p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form class="auth-form" [formGroup]="passwordForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-input"
          [class.input-error]="password?.invalid && password?.touched"
          placeholder="Create a password"
          formControlName="password"/>
        <span class="field-error" *ngIf="password?.invalid && password?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="form-input"
          [class.input-error]="passwordForm.hasError('passwordMismatch') && confirmPassword?.touched"
          placeholder="Confirm your password"
          formControlName="confirmPassword"/>
        <span class="field-error"
          *ngIf="passwordForm.hasError('passwordMismatch') && confirmPassword?.touched">
          Passwords do not match
        </span>
      </div>

      <button type="submit" class="btn btn-primary"
        [disabled]="passwordForm.invalid || isLoading">
        {{ isLoading ? 'Setting password...' : 'Set Password' }}
      </button>

    </form>
  </div>
</div>
