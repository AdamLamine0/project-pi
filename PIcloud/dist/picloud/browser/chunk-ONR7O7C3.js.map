<div class="profile-page">

  <!-- Sidebar -->
  <aside class="profile-sidebar">
    <div class="avatar-wrap">
      <div class="avatar">{{ initials }}</div>
      <div>
        <div class="avatar-name">{{ user?.name }} {{ user?.prenom }}</div>
        <div class="avatar-email">{{ user?.email }}</div>
      </div>
    </div>
    <span class="role-badge"
      [class.role-admin]="user?.role === 'ADMIN'"
      [class.role-user]="user?.role === 'USER'"
      [class.role-mentor]="user?.role === 'MENTOR'"
      [class.role-investor]="user?.role === 'INVESTOR'"
      [class.role-partner]="user?.role === 'PARTNER'"
      [class.role-entrepreneur]="user?.role === 'ENTREPRENEUR'"
      [class.role-expert]="user?.role === 'EXPERT'">>
      {{ user?.role }}
    </span>
    <nav class="side-nav">
   <button class="side-link" [class.active]="activeTab === 'profile'"
  (click)="switchTab('profile')">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>
  Profil
</button>

<button class="side-link" [class.active]="activeTab === 'password'"
  (click)="switchTab('password')">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="11" width="18" height="11" rx="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
  Mot de passe
</button>

<button class="side-link" routerLink="/user/badges"
  [class.active]="currentUrl === '/user/badges'">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="8" r="6"/>
    <path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/>
  </svg>
  Mes Badges
</button>

<button class="side-link" routerLink="/user/certificates"
  [class.active]="currentUrl === '/user/certificates'">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
  </svg>
  Mes Certificats
</button>
<!-- Lien legal selon le rôle -->
<button class="side-link"
  *ngIf="authService.isEntrepreneur()"
  routerLink="/legal-procedures/list"
  [class.active]="currentUrl.startsWith('/legal-procedures')">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
  </svg>
  Mes dossiers juridiques
</button>

<button class="side-link"
  *ngIf="authService.isExpert()"
  routerLink="/legal-procedures/expert/assigned"
  [class.active]="currentUrl.startsWith('/legal-procedures')">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
  </svg>
  Dossiers à traiter
</button>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="profile-main">

    <!-- Alerts -->
    <div class="alert alert-success" *ngIf="successMessage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      {{ successMessage }}
    </div>
    <div class="alert alert-error" *ngIf="errorMessage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ errorMessage }}
    </div>

    <!-- Profile tab -->
    <section *ngIf="activeTab === 'profile'">
      <div class="section-head">
        <div>
          <div class="section-label">Informations personnelles</div>
          <h2 class="section-title">Votre profil</h2>
        </div>
        <button class="btn-edit" *ngIf="!isEditing" (click)="enableEdit()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Modifier
        </button>
      </div>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <div class="fields-grid">
          <div class="field-group">
            <label>Nom</label>
            <input type="text" class="field-input" formControlName="name" [attr.readonly]="!isEditing ? '' : null"/>
          </div>
          <div class="field-group">
            <label>Prénom</label>
            <input type="text" class="field-input" formControlName="prenom" [attr.readonly]="!isEditing ? '' : null"/>
          </div>
          <div class="field-group full">
            <label>Adresse e-mail</label>
            <input type="email" class="field-input" formControlName="email" [attr.readonly]="!isEditing ? '' : null"/>
          </div>
          <div class="field-group full">
            <label>Statut</label>
            <input type="text" class="field-input" formControlName="statut" [attr.readonly]="!isEditing ? '' : null"/>
          </div>
        </div>

        <div class="form-actions" *ngIf="isEditing">
  <button type="button" class="btn-cancel" (click)="cancelEdit()">
    Annuler
  </button>
  <button type="submit" class="btn-save" [disabled]="profileForm.invalid || isLoading">
    <span class="spinner" *ngIf="isLoading"></span>
    {{ isLoading ? 'Enregistrement...' : 'Enregistrer' }}
  </button>
</div>
      </form>
    </section>

    <!-- Password tab -->
    <section *ngIf="activeTab === 'password'">
      <div class="section-head">
        <div>
          <div class="section-label">Sécurité</div>
          <h2 class="section-title">Changer le mot de passe</h2>
        </div>
      </div>

      <form [formGroup]="passwordForm" (ngSubmit)="onChangePassword()">
        <div class="fields-grid">
          <div class="field-group full">
            <label>Mot de passe actuel</label>
            <input type="password" class="field-input" formControlName="oldPassword" placeholder="••••••••"/>
          </div>
          <div class="field-group full">
            <label>Nouveau mot de passe</label>
            <input type="password" class="field-input" formControlName="newPassword" placeholder="Minimum 6 caractères"/>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="activeTab = 'profile'; showPasswordForm = false">Annuler</button>
          <button type="submit" class="btn-save" [disabled]="passwordForm.invalid || isLoading">
            <span class="spinner" *ngIf="isLoading"></span>
            {{ isLoading ? 'Modification...' : 'Changer le mot de passe' }}
          </button>
        </div>
      </form>
    </section>

  </main>
</div>
