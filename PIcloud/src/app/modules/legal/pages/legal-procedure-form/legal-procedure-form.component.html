<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">
        {{ isEditMode ? 'Modifier un dossier' : 'Créer un dossier juridique' }}
      </h1>
      <p class="page-subtitle">
        Saisie et mise à jour des informations du dossier.
      </p>
    </div>

    <button class="btn btn-outline-secondary" type="button" (click)="goBack()">
      Retour
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <div class="card-custom">
    <div class="form-section">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Entrepreneur ID</label>
            <input class="form-control input-modern" formControlName="entrepreneurId" />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Expert ID</label>
            <input class="form-control input-modern" formControlName="expertId" />
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Type de procédure</label>
            <select class="form-select select-modern" formControlName="procedureType">
              <option value="">Sélectionner</option>
              <option *ngFor="let type of procedureTypes" [value]="type">{{ type }}</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Notes</label>
            <textarea class="form-control textarea-modern" rows="5" formControlName="notes"></textarea>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary-custom" type="submit" [disabled]="loading">
            {{ isEditMode ? 'Enregistrer les modifications' : 'Créer le dossier' }}
          </button>

          <button class="btn btn-outline-secondary" type="button" (click)="goBack()">
            Annuler
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
