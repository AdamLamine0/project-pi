<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Gestion des dossiers juridiques</h2>
    <button class="btn btn-primary" (click)="openCreate()">Nouveau dossier</button>
  </div>

  <div class="row mb-3">
    <div class="col-md-4">
      <label class="form-label">Filtrer par statut</label>
      <select class="form-select" [(ngModel)]="selectedStatus" (change)="applyFilter()">
        <option value="">Tous</option>
        <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
      </select>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="loading" class="alert alert-info">Chargement...</div>

  <table class="table table-striped table-bordered" *ngIf="!loading">
    <thead>
      <tr>
        <th>Type</th>
        <th>Statut</th>
        <th>Progression</th>
        <th>Date création</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let procedure of filteredProcedures">
        <td>{{ procedure.procedureType }}</td>
        <td>{{ procedure.status }}</td>
        <td>{{ procedure.completionRate }} %</td>
        <td>{{ procedure.createdAt | date:'short' }}</td>
        <td class="d-flex gap-2 flex-wrap">
          <a class="btn btn-sm btn-outline-primary" [routerLink]="['/legal-procedures', procedure.id]">Détail</a>
          <a class="btn btn-sm btn-outline-warning" [routerLink]="['/legal-procedures', procedure.id, 'edit']">Modifier</a>
          <button class="btn btn-sm btn-outline-secondary"
                  *ngIf="procedure.status === 'COMPLETE' || procedure.status === 'REFUSE' || procedure.status === 'ABANDONNE'"
                  (click)="archive(procedure.id)">
            Archiver
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  *ngIf="procedure.status === 'BROUILLON'"
                  (click)="deleteDraft(procedure.id)">
            Supprimer
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
