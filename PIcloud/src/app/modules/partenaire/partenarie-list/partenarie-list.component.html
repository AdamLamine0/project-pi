<div class="meeting-overlay" *ngIf="isMeetingModalOpen && canRequestMeeting"
  (click)="closeMeetingModal(false)">
  <div class="meeting-shell" (click)="$event.stopPropagation()">
    <div style="padding:24px; min-width:340px;">

      <h3 style="margin:0 0 4px; font-size:15px; font-weight:700;">
        Demander une réunion
      </h3>
      <p style="margin:0 0 16px; font-size:12px; color:#6B7280;">
        {{ selectedPartnerForMeeting?.nom }}
      </p>

      <div *ngIf="meetingError"
        style="margin-bottom:12px; padding:8px 12px; background:#FEE2E2; color:#991B1B; border-radius:8px; font-size:12px;">
        {{ meetingError }}
      </div>

      <div style="display:flex; flex-direction:column; gap:12px;">
        <div>
          <label style="display:block; font-size:12px; font-weight:600; margin-bottom:4px;">Sujet *</label>
          <input type="text" [(ngModel)]="meetingSubject" placeholder="Objet de la réunion"
            style="width:100%; padding:8px 12px; border:1px solid #E5E7EB; border-radius:8px; font-size:13px;" />
        </div>
        <div>
          <label style="display:block; font-size:12px; font-weight:600; margin-bottom:4px;">Date et heure *</label>
          <input type="datetime-local" [(ngModel)]="meetingDate"
            style="width:100%; padding:8px 12px; border:1px solid #E5E7EB; border-radius:8px; font-size:13px;" />
        </div>
        <div>
          <label style="display:block; font-size:12px; font-weight:600; margin-bottom:4px;">Durée (minutes)</label>
          <input type="number" [(ngModel)]="meetingDuration" min="15" max="180"
            style="width:100%; padding:8px 12px; border:1px solid #E5E7EB; border-radius:8px; font-size:13px;" />
        </div>
        <div>
          <label style="display:block; font-size:12px; font-weight:600; margin-bottom:4px;">Note (optionnel)</label>
          <textarea [(ngModel)]="meetingNote" rows="3" placeholder="Message additionnel..."
            style="width:100%; padding:8px 12px; border:1px solid #E5E7EB; border-radius:8px; font-size:13px; resize:vertical;">
          </textarea>
        </div>
      </div>

      <div style="display:flex; gap:8px; margin-top:16px; justify-content:flex-end;">
        <button (click)="closeMeetingModal(false)"
          style="padding:8px 16px; border:1px solid #E5E7EB; border-radius:8px; background:transparent; font-size:13px; cursor:pointer;">
          Annuler
        </button>
        <button (click)="submitMeeting()" [disabled]="meetingSending"
          style="padding:8px 16px; border:none; border-radius:8px; background:linear-gradient(135deg,#1C4FC3,#1D1384); color:#fff; font-size:13px; font-weight:600; cursor:pointer;">
          {{ meetingSending ? 'Envoi...' : 'Envoyer' }}
        </button>
      </div>

    </div>
  </div>
</div>
