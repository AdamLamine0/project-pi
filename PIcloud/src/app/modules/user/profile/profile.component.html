<div class="profile-container">
  <div class="profile-card">

    <div class="profile-header">
      <div class="avatar">
        <span>{{ initials }}</span>
      </div>
      <h1>{{ user?.name }} {{ user?.prenom }}</h1>
      <p>{{ user?.email }}</p>
      <span class="role-badge" [class.role-admin]="user?.role === 'ADMIN'"
                               [class.role-user]="user?.role === 'USER'">
        {{ user?.role }}
      </span>
    </div>

    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form class="profile-form" [formGroup]="profileForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" class="form-input" formControlName="name"/>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" class="form-input" formControlName="prenom"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-input" formControlName="email"/>
      </div>

      <div class="form-group">
        <label>Statut</label>
        <input type="text" class="form-input" formControlName="statut"/>
      </div>

      <div class="form-actions" *ngIf="!isEditing">
        <button type="button" class="btn btn-secondary"
          (click)="showPasswordForm = !showPasswordForm">
          Change Password
        </button>
        <button type="button" class="btn btn-primary" (click)="enableEdit()">
          Edit Profile
        </button>
      </div>

      <div class="form-actions" *ngIf="isEditing">
        <button type="button" class="btn btn-secondary" (click)="cancelEdit()">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary"
          [disabled]="profileForm.invalid || isLoading">
          {{ isLoading ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>

    </form>

    <!-- Change Password Section -->
    <div class="password-section" *ngIf="showPasswordForm">
      <h3>Change Password</h3>
      <form [formGroup]="passwordForm" (ngSubmit)="onChangePassword()">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" class="form-input"
            formControlName="oldPassword" placeholder="Current password"/>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" class="form-input"
            formControlName="newPassword" placeholder="New password (min 6 chars)"/>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary"
            (click)="showPasswordForm = false">Cancel</button>
          <button type="submit" class="btn btn-primary"
            [disabled]="passwordForm.invalid || isLoading">
            {{ isLoading ? 'Changing...' : 'Change Password' }}
          </button>
        </div>
      </form>
    </div>

  </div>
</div>
