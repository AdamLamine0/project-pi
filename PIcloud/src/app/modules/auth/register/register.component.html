<div class="auth-container">
  <div class="auth-card">

    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Sign up to get started</p>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" class="form-input"
            [class.input-error]="name?.invalid && name?.touched"
            placeholder="Nom" formControlName="name"/>
          <span class="field-error" *ngIf="name?.invalid && name?.touched">
            Required
          </span>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" class="form-input"
            [class.input-error]="prenom?.invalid && prenom?.touched"
            placeholder="Prénom" formControlName="prenom"/>
          <span class="field-error" *ngIf="prenom?.invalid && prenom?.touched">
            Required
          </span>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-input"
          [class.input-error]="email?.invalid && email?.touched"
          placeholder="Enter your email" formControlName="email"/>
        <span class="field-error" *ngIf="email?.invalid && email?.touched">
          Please enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-input"
          [class.input-error]="password?.invalid && password?.touched"
          placeholder="Create a password" formControlName="password"/>
        <span class="field-error" *ngIf="password?.invalid && password?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="form-input"
          [class.input-error]="registerForm.hasError('passwordMismatch') && confirmPassword?.touched"
          placeholder="Confirm your password" formControlName="confirmPassword"/>
        <span class="field-error"
          *ngIf="registerForm.hasError('passwordMismatch') && confirmPassword?.touched">
          Passwords do not match
        </span>
      </div>

      <button type="submit" class="btn btn-primary"
        [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

      <div class="auth-redirect">
        <p>Already have an account?
          <a routerLink="/auth/login" class="link-bold">Sign in</a>
        </p>
      </div>

    </form>
  </div>
</div>
