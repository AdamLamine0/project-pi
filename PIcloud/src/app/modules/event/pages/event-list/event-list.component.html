<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Events</h2>
    <a routerLink="/events/new" class="btn btn-primary">
      <i class="bi bi-plus-lg"></i> New Event
    </a>
  </div>

  <!-- Filters -->
  <div class="row g-2 mb-4">
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="selectedType" (change)="onFilterChange()">
        <option value="">All types</option>
        <option *ngFor="let t of eventTypes" [value]="t">{{ t }}</option>
      </select>
    </div>
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="selectedStatus" (change)="onFilterChange()">
        <option value="">All statuses</option>
        <option *ngFor="let s of eventStatuses" [value]="s">{{ s }}</option>
      </select>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <!-- Empty -->
  <div *ngIf="!loading && !error && events.length === 0" class="text-center py-5 text-muted">
    <i class="bi bi-calendar-x fs-1"></i>
    <p class="mt-2">No events found.</p>
  </div>

  <!-- Grid -->
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" *ngIf="!loading && events.length > 0">
    <div class="col" *ngFor="let event of events">
      <app-event-card [event]="event" (deleted)="onDelete($event)"></app-event-card>
    </div>
  </div>

</div>
