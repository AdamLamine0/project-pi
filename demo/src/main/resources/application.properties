spring.application.name=legal-pi

# Change port to avoid conflict with other services
server.port=8087

# Database ? use a dedicated schema
spring.datasource.url=jdbc:mysql://localhost:3306/legal_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.default-property-inclusion=non_null

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Upload config
app.upload.dir=uploads
app.base-url=http://localhost:8087

# External AI microservice
app.ai-service.base-url=http://localhost:8091
app.ai-service.timeout-seconds=90

app.users-service.base-url=http://localhost:8090/api/users
app.users-service.fallback-base-url=http://localhost:8081/api/users
app.users-service.timeout-seconds=10

# Eureka ? register with your discovery server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
