spring.datasource.url=jdbc:h2:mem:legal_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

app.upload.dir=target/test-uploads
app.base-url=http://localhost:8087

app.ai-service.base-url=http://localhost:8092
app.ai-service.timeout-seconds=5
