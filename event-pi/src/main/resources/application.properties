spring.application.name=event-pi
server.port=8083

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/event_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Upload config
app.upload.dir=uploads/events
app.upload.speakers-dir=uploads/speakers
app.upload.certificates-dir=uploads/certificates
app.base-url=http://localhost:8083
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Feign
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=3000

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# App info
app.name=PIcloud
app.frontend-url=http://localhost:4200

# Groq AI
groq.api.key=YOUR_GROQ_API_KEY_HERE
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# ML Service
ml-service.url=http://localhost:8085

# Weather
weather.api.key=${WEATHER_API_KEY:}

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}