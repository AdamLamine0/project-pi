server:
  port: 8084

spring:
  application:
    name: community-service
  data:
    mongodb:
      uri: mongodb+srv://YOUR_MONGO_USER:YOUR_MONGO_PASSWORD@YOUR_CLUSTER.mongodb.net/community_db?appName=Cluster0
  mongodb:
    uri: mongodb+srv://YOUR_MONGO_USER:YOUR_MONGO_PASSWORD@YOUR_CLUSTER.mongodb.net/community_db?appName=Cluster0

groq:
  api:
    key: YOUR_GROQ_API_KEY_HERE

user:
  service:
    url: http://localhost:8081/api/users

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.apache.pdfbox: ERROR
    org.apache.pdfbox.pdmodel.font.PDSimpleFont: ERROR
    com.projectmentor.communityservice.marketplace.service.CandidateMLService: DEBUG