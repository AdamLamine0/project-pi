name: Build and Push Docker Images

on:
  push:
    branches:
      - faten
      - dockerfile

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push eureka-server
        uses: docker/build-push-action@v6
        with:
          context: ./eureka-server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eureka-server:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      - name: Build and push user-pi
        uses: docker/build-push-action@v6
        with:
          context: ./userPI
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/user-pi:latest

      - name: Build and push gestionprojets
        uses: docker/build-push-action@v6
        with:
          context: ./gestionprojets
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gestionprojets:latest

      - name: Build and push investment-pi
        uses: docker/build-push-action@v6
        with:
          context: ./investment-pi
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/investment-pi:latest

      - name: Build and push partenariat-pi
        uses: docker/build-push-action@v6
        with:
          context: ./partenariat-pi
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/partenariat-pi:latest

      - name: Build and push ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-service:latest

      - name: Build and push community-service
        uses: docker/build-push-action@v6
        with:
          context: ./community-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/community-service:latest

      - name: Build and push event-pi
        uses: docker/build-push-action@v6
        with:
          context: ./event-pi
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-pi:latest

      - name: Build and push legal-pi
        uses: docker/build-push-action@v6
        with:
          context: ./demo
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/legal-pi:latest

      - name: Build and push event-ml-service
        uses: docker/build-push-action@v6
        with:
          context: ./event-pi/ml-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-ml-service:latest

      - name: Build and push gestionprojets-ml-service
        uses: docker/build-push-action@v6
        with:
          context: ./gestionprojets/ml-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gestionprojets-ml-service:latest

      - name: Build and push new-front
        uses: docker/build-push-action@v6
        with:
          context: ./new-front
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/new-front:latest
