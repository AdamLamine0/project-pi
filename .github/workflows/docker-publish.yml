name: Build and Push Docker Images

on:
  push:
    branches:
      - faten
      - dockerfile

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push eureka-server
        uses: docker/build-push-action@v6
        with:
          context: ./eureka-server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eureka-server:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest

      - name: Build and push user-pi
        uses: docker/build-push-action@v6
        with:
          context: ./userPI
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/user-pi:latest
