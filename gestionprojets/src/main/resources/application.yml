spring:
  application:
    name: gestion-projets-service
  datasource:
    url: jdbc:h2:mem:gestion_projets;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
  config:
    import: optional:file:.env[.properties]
  cache:
    type: simple

server:
  port: 8099
  servlet:
    context-path: /

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.value}

app:
  ml:
    base-url: ${ML_SERVICE_URL:http://localhost:8001}
    timeout-seconds: ${ML_TIMEOUT_SECONDS:30}
    cache-ttl-seconds: ${ML_CACHE_TTL_SECONDS:3600}
