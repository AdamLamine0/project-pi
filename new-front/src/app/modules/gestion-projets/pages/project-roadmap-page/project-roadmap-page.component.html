<div class="roadmap-layout" *ngIf="!loading && project">
  <aside class="roadmap-side">
    <h5>Roadmap IA</h5>
    <a [routerLink]="['/projects', project.id]">Fiche projet</a>
    <a [routerLink]="['/projects', project.id, 'roadmap']" class="active">Timeline IA</a>
    <a routerLink="/dashboard">Dashboard</a>
  </aside>

  <section class="roadmap-content">
    <div class="roadmap-header">
      <div class="ai-badge">Générée dynamiquement par IA</div>
      <h2 class="mt-3 font-weight-bold">Votre Parcours</h2>
      <div class="progress mt-4 custom-progress-wrap"><div class="progress-bar custom-bar" [style.width.%]="completionPercent"></div></div>
      <p class="text-secondary mt-2 small text-uppercase tracking-wide">{{ completedCount }}/{{ tasks.length }} étapes franchises - {{ completionPercent }}%</p>
    </div>

    <div class="chemin-container">
      <div class="chemin-path"></div>
      
      <div class="checkpoint" *ngFor="let task of tasks; let i = index" [class.done]="getDotClass(task) === 'done'" [class.active]="getDotClass(task) === 'active'" [class.right]="i % 2 !== 0">
        <div class="checkpoint-node"></div>
        
        <article class="checkpoint-card" [class.expanded]="activeTask?.id === task.id">
          <h6>{{ task.title }}</h6>
          <p>{{ task.description }}</p>
          <div class="task-status">
            <span class="badge border bg-dark text-white me-2">{{ task.status }}</span>
            <small *ngIf="task.dueDate" class="text-white-50">Échéance: {{ task.dueDate }}</small>
          </div>
          
          <div class="update-panel mt-4 pt-3 border-top border-secondary border-opacity-25" *ngIf="activeTask?.id === task.id">
            <label class="form-label text-info small text-uppercase">Mettre à jour l'avancement (%)</label>
            <input type="range" class="form-range custom-range" min="0" max="100" [(ngModel)]="updateProgress" />
            <div class="d-flex justify-content-between align-items-center mt-2">
              <span class="fs-5 font-weight-bold text-white">{{ updateProgress }}%</span>
              <button class="btn btn-primary btn-sm px-4 rounded-pill shadow-sm" (click)="submitActiveUpdate()">Valider</button>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>
</div>

<div *ngIf="loading" class="roadmap-layout d-flex justify-content-center align-items-center bg-dark">
  <div class="spinner-border text-info" style="width: 3rem; height: 3rem;"></div>
</div>
