<div class="card h-100 cursor-pointer" (click)="onView()">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title">{{ project.title }}</h5>
      <span class="badge" [ngClass]="'bg-' + getStatusColor(project.status)">
        {{ project.status }}
      </span>
    </div>
    
    <p class="card-text text-muted small">
      {{ project.description | slice:0:100 }}{{ project.description && project.description.length > 100 ? '...' : '' }}
    </p>

    <div class="mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <small class="text-muted">Progression</small>
        <small class="text-muted">{{ project.progress || 0 }}%</small>
      </div>
      <div class="progress">
        <div class="progress-bar" [style.width.%]="project.progress || 0"></div>
      </div>
    </div>

    <div class="row text-center text-muted small mb-3">
      <div class="col-6">
        <i class="bi bi-calendar"></i> {{ project.startDate | date:'dd/MM/yyyy' }}
      </div>
      <div class="col-6">
        <i class="bi bi-flag"></i> {{ project.endDate | date:'dd/MM/yyyy' }}
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-primary flex-grow-1" (click)="onEdit($event)">
        <i class="bi bi-pencil"></i> Modifier
      </button>
      <button class="btn btn-sm btn-outline-danger" (click)="onDelete($event)">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </div>
</div>
