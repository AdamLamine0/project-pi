<div class="page-container">
  <div class="page-header d-flex justify-content-between align-items-start mb-4">
    <div>
      <h1 class="page-title">Create a legal case</h1>
      <p class="page-subtitle">Enter the required information to open your case.</p>
    </div>
    <button class="btn btn-outline-secondary" type="button" (click)="goBack()">Back</button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <div class="card-custom">
    <div class="form-section">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-4">

          <div class="col-md-6">
            <label class="form-label fw-semibold">Project name *</label>
            <input class="form-control input-modern"
                   formControlName="projectName"
                   placeholder="Example: FinTech startup Tunis" />
            <div *ngIf="form.get('projectName')?.invalid && form.get('projectName')?.touched"
                 class="text-danger small mt-1">
              Project name is required.
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Procedure type *</label>
            <select class="form-select select-modern" formControlName="procedureType">
              <option value="">Select</option>
              <option *ngFor="let type of procedureTypes" [value]="type">
                {{ procedureTypeLabels[type] }}
              </option>
            </select>
            <div *ngIf="form.get('procedureType')?.invalid && form.get('procedureType')?.touched"
                 class="text-danger small mt-1">
              Please choose a procedure type.
            </div>
          </div>

          <div class="col-md-12">
            <label class="form-label fw-semibold">Legal expert *</label>
            <select class="form-select select-modern" formControlName="expertId">
              <option value="">Select an expert</option>
              <option *ngFor="let expert of experts" [value]="expert.id">
                {{ expert.fullName }} - {{ expert.email }}
              </option>
            </select>
            <div *ngIf="form.get('expertId')?.invalid && form.get('expertId')?.touched"
                 class="text-danger small mt-1">
              Please choose an expert.
            </div>
          </div>

        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary-custom" type="submit" [disabled]="loading">
            {{ loading ? 'Creating...' : 'Create case' }}
          </button>
          <button class="btn btn-outline-secondary" type="button" (click)="goBack()">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
