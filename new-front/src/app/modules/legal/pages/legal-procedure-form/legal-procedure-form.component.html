<div class="legal-form-shell">
  <section class="legal-form-hero">
    <div>
      <span class="legal-form-eyebrow">New procedure</span>
      <h1>Create a legal case</h1>
      <p>Fill in the essentials to open your case and assign it to the right expert.</p>
    </div>
    <button class="legal-form-back" type="button" (click)="goBack()">Back</button>
  </section>

  <div *ngIf="errorMessage" class="legal-form-alert legal-form-alert--error">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="legal-form-alert legal-form-alert--success">{{ successMessage }}</div>

  <section class="legal-form-card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="legal-form-grid">
      <div class="legal-field legal-field--half">
        <label>Project name *</label>
        <input class="legal-input"
               formControlName="projectName"
               placeholder="Example: FinTech startup Tunis" />
        <div *ngIf="form.get('projectName')?.invalid && form.get('projectName')?.touched"
             class="legal-field-error">
          Project name is required.
        </div>
      </div>

      <div class="legal-field legal-field--half">
        <label>Procedure type *</label>
        <select class="legal-input" formControlName="procedureType">
          <option value="">Select</option>
          <option *ngFor="let type of procedureTypes" [value]="type">
            {{ procedureTypeLabels[type] }}
          </option>
        </select>
        <div *ngIf="form.get('procedureType')?.invalid && form.get('procedureType')?.touched"
             class="legal-field-error">
          Please choose a procedure type.
        </div>
      </div>

      <div class="legal-field">
        <label>Legal expert *</label>
        <select class="legal-input" formControlName="expertId">
          <option value="">Select an expert</option>
          <option *ngFor="let expert of experts" [value]="expert.id">
            {{ expert.fullName }} - {{ expert.email }}
          </option>
        </select>
        <div *ngIf="form.get('expertId')?.invalid && form.get('expertId')?.touched"
             class="legal-field-error">
          Please choose an expert.
        </div>
      </div>

      <div class="legal-form-actions">
        <button class="legal-form-submit" type="submit" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create case' }}
        </button>
        <button class="legal-form-cancel" type="button" (click)="goBack()">
          Cancel
        </button>
      </div>
    </form>
  </section>
</div>
