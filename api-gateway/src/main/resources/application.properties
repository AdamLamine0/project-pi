# Spring Boot
spring.application.name=api-gateway
server.port=8091

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Eureka refresh rapide
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
eureka.client.registry-fetch-interval-seconds=5

# Spring Cloud LoadBalancer cache
spring.cloud.loadbalancer.cache.ttl=5s

# In Kubernetes, route auth/users through the stable ClusterIP service instead of
# Eureka's pod hostname, which is not always resolvable by other pods.
services.user-pi.uri=${SERVICES_USER_PI_URI:http://user-pi:8081}

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG
