spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: gestion-projets
          uri: lb://gestion-projets
          predicates:
            - Path=/api/projects/**, /api/admin/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
