spring.application.name=investment-pi
spring.data.mongodb.uri=mongodb://localhost:27017/investment_db
server.port=8085
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_dummy_key}
stripe.public.key=pk_test_51TPlyKLdfAtetbrBd8vl2u2H6uvfvXlzCiN1OtlCB1NGVs48916B1LbUMqA3uTPSliYhZFnOIanDY67nJhOFIQKb00xA89RyiG
stripe.success.url=http://localhost:4200/app/investments/payment-success?session_id={CHECKOUT_SESSION_ID}
stripe.cancel.url=http://localhost:4200/app/investments/payment-cancel
app.exchange.rate.tnd.eur=3.35
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
eureka.client.registry-fetch-interval-seconds=5
